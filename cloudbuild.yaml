steps:

  # Step 1 — Backend unit tests
  - name: 'python:3.11-slim'
    id: 'test-backend'
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r backend/requirements.txt pytest pytest-asyncio --quiet
        cd backend && python -m pytest tests/ -v --tb=short
    env:
      - 'PYTHONDONTWRITEBYTECODE=1'

  # Step 2 — Build image with cache
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - build
      - --tag=asia-south1-docker.pkg.dev/$PROJECT_ID/ecotrack/app:$COMMIT_SHA
      - --tag=asia-south1-docker.pkg.dev/$PROJECT_ID/ecotrack/app:latest
      - --cache-from=asia-south1-docker.pkg.dev/$PROJECT_ID/ecotrack/app:latest
      - --build-arg=VITE_API_BASE_URL=/api
      - .
    waitFor: ['test-backend']

  # Step 3 — Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecotrack/app']
    waitFor: ['build-image']

  # Step 4 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ecotrack
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/ecotrack/app:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_COLLECTION=footprints
      - --service-account=ecotrack-cloudrun@$PROJECT_ID.iam.gserviceaccount.com
    waitFor: ['push-image']

  # Step 5 — Smoke test
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'smoke-test'
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ecotrack \
          --region=asia-south1 --format='value(status.url)')
        curl -sf "$URL/api/health" | grep -q '"status":"ok"' \
          && echo "✅ Health check PASSED" \
          || (echo "❌ FAILED" && exit 1)
    waitFor: ['deploy-cloudrun']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: '1200s'
